name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  draft-release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract tag name
        id: meta
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          name: Tether ${{ steps.meta.outputs.tag }}

  build-windows:
    name: Build Windows
    needs: draft-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build
        run: npm run build

      - name: Package (Windows)
        run: npx electron-builder --win --publish never

      - name: Upload Windows artifacts
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            dist/*.exe

  build-macos:
    name: Build macOS
    needs: draft-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package (macOS)
        run: npx electron-builder --mac --publish never

      - name: Upload macOS artifacts
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            dist/*.dmg
            dist/*.zip

  build-linux:
    name: Build Linux
    needs: draft-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package (Linux)
        run: npx electron-builder --linux --publish never

      - name: Upload Linux artifacts
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            dist/*.AppImage
            dist/*.snap
            dist/*.deb

  publish-release:
    name: Publish Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
